<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Travel Buddy - Попутчики 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>🧳 Travel Buddy</h1>
            <p class="date" id="currentDate"></p>
        </header>

        <div class="user-profile" id="userProfile">
            <div class="avatar" id="userAvatar">👤</div>
            <div class="user-info">
                <h3 id="userName">Загрузка...</h3>
                <p id="userLanguage"></p>
                <p id="userId" class="user-id"></p>
            </div>
        </div>

        <div class="popular-destinations">
            <h2>Популярные направления (Март 2026)</h2>
            <div class="destinations-grid" id="destinationsGrid">
                <div class="destination-card" data-country="Турция">
                    <span class="emoji">🇹🇷</span>
                    <span>Турция</span>
                    <small>24 попутчика</small>
                </div>
                <div class="destination-card" data-country="Египет">
                    <span class="emoji">🇪🇬</span>
                    <span>Египет</span>
                    <small>18 попутчиков</small>
                </div>
                <div class="destination-card" data-country="ОАЭ">
                    <span class="emoji">🇦🇪</span>
                    <span>ОАЭ</span>
                    <small>15 попутчиков</small>
                </div>
                <div class="destination-card" data-country="Таиланд">
                    <span class="emoji">🇹🇭</span>
                    <span>Таиланд</span>
                    <small>32 попутчика</small>
                </div>
                <div class="destination-card" data-country="Грузия">
                    <span class="emoji">🇬🇪</span>
                    <span>Грузия</span>
                    <small>12 попутчиков</small>
                </div>
                <div class="destination-card" data-country="Италия">
                    <span class="emoji">🇮🇹</span>
                    <span>Италия</span>
                    <small>21 попутчик</small>
                </div>
            </div>
        </div>

        <div class="search-section">
            <h2>🔍 Найти попутчика</h2>
            <select id="countrySelect">
                <option value="">Куда едете?</option>
                <option value="Турция">🇹🇷 Турция</option>
                <option value="Египет">🇪🇬 Египет</option>
                <option value="ОАЭ">🇦🇪 ОАЭ</option>
                <option value="Таиланд">🇹🇭 Таиланд</option>
                <option value="Грузия">🇬🇪 Грузия</option>
                <option value="Италия">🇮🇹 Италия</option>
            </select>
            <button id="searchBtn" class="primary-btn">🔎 Искать попутчиков</button>
        </div>

        <div class="companions-list" id="companionsList">
            <h3>Найдено попутчиков: <span id="companionsCount">0</span></h3>
            <div id="companionsContainer"></div>
        </div>

        <div class="request-form" id="requestForm">
            <h2>✍️ Я тоже ищу попутчика</h2>
            <form id="buddyForm">
                <select id="destinationSelect" required>
                    <option value="">Выберите страну</option>
                    <option value="Турция">🇹🇷 Турция</option>
                    <option value="Египет">🇪🇬 Египет</option>
                    <option value="ОАЭ">🇦🇪 ОАЭ</option>
                    <option value="Таиланд">🇹🇭 Таиланд</option>
                    <option value="Грузия">🇬🇪 Грузия</option>
                    <option value="Италия">🇮🇹 Италия</option>
                </select>
                <input type="date" id="startDate" placeholder="Дата отъезда" required>
                <input type="date" id="endDate" placeholder="Дата возвращения" required>
                <textarea id="comment" placeholder="Расскажите о себе и планах" rows="3"></textarea>
                <button type="submit" class="submit-btn">📢 Опубликовать</button>
            </form>
        </div>

        <div class="info-message" id="infoMessage"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
